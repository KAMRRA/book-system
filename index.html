<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>병동 도서 관리 시스템</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f4f3ef;
            --surface: #ffffff;
            --surface2: #f9f8f5;
            --border: #e0ddd6;
            --text: #1a1a1a;
            --text2: #666;
            --text3: #999;
            --primary: #2d6a4f;
            --primary-light: #52b788;
            --primary-pale: #d8f3dc;
            --danger: #c0392b;
            --danger-pale: #fdecea;
            --warning: #e67e22;
            --warning-pale: #fef5ec;
            --info: #2980b9;
            --info-pale: #eaf4fb;
            --success: #27ae60;
            --success-pale: #eafaf1;
            --overdue: #6d28d9;
            --overdue-pale: #ede9fe;
            --radius: 10px;
            --shadow: 0 2px 12px rgba(0,0,0,0.08);
            --shadow-lg: 0 8px 30px rgba(0,0,0,0.15);
            /* 장르 색상 */
            --g1: #e63946; --g2: #457b9d; --g3: #1d3557;
            --g4: #2a9d8f; --g5: #e9c46a; --g6: #6a4c93;
            --g7: #f4a261; --g8: #adb5bd;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: var(--bg); color: var(--text); min-height: 100vh; }

        /* 헤더 */
        .app-header { background: var(--primary); color: white; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 8px rgba(0,0,0,0.2); position: sticky; top: 0; z-index: 100; }
        .app-header h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: -0.3px; }
        .app-header .sub { font-size: 0.75rem; opacity: 0.8; margin-top: 2px; }
        .header-actions { display: flex; gap: 8px; align-items: center; }
        .btn-icon { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; font-family: inherit; transition: background 0.2s; }
        .btn-icon:hover { background: rgba(255,255,255,0.25); }

        /* 레이아웃 */
        .app-body { max-width: 1100px; margin: 0 auto; padding: 20px 16px; display: grid; grid-template-columns: 320px 1fr; gap: 20px; }
        @media (max-width: 768px) { .app-body { grid-template-columns: 1fr; } }

        .card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px; border: 1px solid var(--border); }
        .card-title { font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text3); margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }

        /* 폼 */
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 0.78rem; font-weight: 500; color: var(--text2); margin-bottom: 4px; }
        input[type=text], input[type=date], select, textarea { width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 0.9rem; font-family: inherit; background: var(--surface); color: var(--text); transition: border-color 0.2s, box-shadow 0.2s; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--primary-light); box-shadow: 0 0 0 3px rgba(82,183,136,0.15); }
        textarea { resize: vertical; min-height: 60px; }

        .btn { padding: 9px 16px; border: none; border-radius: 6px; font-size: 0.85rem; font-family: inherit; font-weight: 500; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 5px; }
        .btn-primary { background: var(--primary); color: white; } .btn-primary:hover { background: #245e44; }
        .btn-success { background: var(--success); color: white; } .btn-success:hover { background: #219a52; }
        .btn-danger { background: var(--danger); color: white; } .btn-danger:hover { background: #a93226; }
        .btn-warning { background: var(--warning); color: white; } .btn-warning:hover { background: #ca6f1e; }
        .btn-info { background: var(--info); color: white; } .btn-info:hover { background: #2471a3; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text2); } .btn-outline:hover { background: var(--surface2); }
        .btn-full { width: 100%; justify-content: center; }
        .btn-sm { padding: 5px 10px; font-size: 0.78rem; }
        .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }

        /* 메시지 바 */
        #msgBar { position: fixed; top: 64px; left: 50%; transform: translateX(-50%) translateY(-10px); background: #1a1a1a; color: white; padding: 10px 20px; border-radius: 8px; font-size: 0.88rem; font-weight: 500; opacity: 0; pointer-events: none; transition: all 0.3s; z-index: 9999; white-space: nowrap; max-width: 90vw; }
        #msgBar.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        #msgBar.success { background: var(--success); }
        #msgBar.error { background: var(--danger); }
        #msgBar.warning { background: var(--warning); }

        /* 장르 배지 */
        .genre-badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 0.72rem; font-weight: 600; color: white; }
        .g-일반소설   { background: var(--g1); }
        .g-취미       { background: var(--g2); }
        .g-무협소설   { background: var(--g3); }
        .g-무협만화   { background: var(--g4); }
        .g-일반만화   { background: #06d6a0; color: #1a1a1a; }
        .g-시집       { background: var(--g6); }
        .g-잡지       { background: var(--g7); color: #1a1a1a; }
        .g-단편       { background: #e84393; }
        .g-기타       { background: var(--g8); color: #333; }

        /* 상태 배지 */
        .status-badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 9px; border-radius: 20px; font-size: 0.78rem; font-weight: 600; }
        .s-available { background: var(--success-pale); color: var(--success); }
        .s-borrowed  { background: var(--danger-pale);  color: var(--danger); }
        .s-extended  { background: var(--warning-pale); color: var(--warning); }
        .s-overdue   { background: var(--overdue-pale); color: var(--overdue); }

        /* 테이블 */
        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th { background: var(--surface2); padding: 10px 12px; text-align: left; font-size: 0.75rem; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.3px; border-bottom: 2px solid var(--border); white-space: nowrap; }
        td { padding: 11px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
        tr:hover td { background: var(--surface2); }
        tr:last-child td { border-bottom: none; }
        tr.overdue-row td { background: #faf5ff; }
        tr.overdue-row:hover td { background: #f3e8ff; }
        .mono { font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; }

        /* 필터 바 */
        .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; }
        .filter-bar input, .filter-bar select { width: auto; flex: 1; min-width: 110px; }
        .count-badge { background: var(--primary-pale); color: var(--primary); padding: 4px 10px; border-radius: 20px; font-size: 0.78rem; font-weight: 700; white-space: nowrap; }

        /* 탭 */
        .tabs { display: flex; gap: 2px; margin-bottom: 16px; border-bottom: 2px solid var(--border); }
        .tab-btn { padding: 8px 16px; border: none; background: transparent; font-size: 0.85rem; font-family: inherit; font-weight: 500; color: var(--text3); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.2s; }
        .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 700; }
        .tab-pane { display: none; }
        .tab-pane.active { display: block; }

        /* 모달 */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(3px); }
        .modal-overlay.open { display: flex; }
        .modal { background: var(--surface); border-radius: 14px; padding: 28px; width: 90%; max-width: 480px; box-shadow: var(--shadow-lg); animation: modalIn 0.25s ease; max-height: 90vh; overflow-y: auto; }
        @keyframes modalIn { from { transform: scale(0.94) translateY(10px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }
        .modal-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
        .modal-title { font-size: 1.1rem; font-weight: 700; }
        .modal-book-id { font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; color: var(--text3); margin-top: 3px; }
        .modal-close { background: none; border: none; font-size: 1.3rem; cursor: pointer; color: var(--text3); line-height: 1; }
        .modal-info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px; background: var(--surface2); border-radius: 8px; padding: 14px; }
        .modal-info-item { font-size: 0.82rem; }
        .modal-info-item .lbl { color: var(--text3); font-size: 0.73rem; margin-bottom: 2px; }
        .modal-info-item .val { font-weight: 500; }
        .modal-actions { display: flex; flex-direction: column; gap: 8px; }
        .modal-section-title { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: var(--text3); margin-bottom: 8px; margin-top: 12px; }

        /* ISBN */
        .isbn-row { display: flex; gap: 8px; }
        .isbn-row input { flex: 1; }
        .isbn-loading { font-size: 0.8rem; color: var(--text3); margin-top: 6px; display: none; }

        /* 우측 패널 */
        .right-panel { display: flex; flex-direction: column; gap: 20px; }

        /* CSV */
        .csv-area { border: 2px dashed var(--border); border-radius: 8px; padding: 20px; text-align: center; }
        .csv-area p { font-size: 0.85rem; color: var(--text3); margin-top: 8px; }

        /* 병동 배지 */
        .ward-badge { background: var(--surface2); border: 1px solid var(--border); padding: 2px 8px; border-radius: 12px; font-size: 0.75rem; color: var(--text2); }

        /* 통계 */
        .stat-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 0; }
        .stat-card { background: var(--surface2); border-radius: 8px; padding: 12px; text-align: center; }
        .stat-card .num { font-size: 1.6rem; font-weight: 700; line-height: 1; }
        .stat-card .lbl { font-size: 0.72rem; color: var(--text3); margin-top: 4px; }
        .stat-card.primary .num { color: var(--primary); }
        .stat-card.danger .num  { color: var(--danger); }
        .stat-card.warning .num { color: var(--warning); }
        .stat-card.overdue .num { color: var(--overdue); }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        @media (max-width: 600px) { .hide-mobile { display: none; } }
    </style>
</head>
<body>

<div id="msgBar"></div>

<header class="app-header">
    <div>
        <h1>📚 병동 도서 관리 시스템</h1>
        <div class="sub">통합 물품 대출 · 반납 · 관리</div>
    </div>
    <div class="header-actions">
        <button class="btn-icon" id="adminLoginBtn">⚙️ 관리자</button>
    </div>
</header>

<div class="app-body">
    <!-- 좌측 -->
    <div class="left-panel">
        <div class="card" style="margin-bottom:20px">
            <div class="card-title">📖 대출 · 반납</div>
            <div class="form-group">
                <label>대출자 이름 (대출 시 필수)</label>
                <input type="text" id="borrowerName" placeholder="이름 입력">
            </div>
            <div class="form-group">
                <label>도서/물품 번호 (바코드 스캔 또는 입력)</label>
                <input type="text" id="bookId" placeholder="번호 스캔 후 Enter" autofocus>
            </div>
            <div class="btn-group">
                <button class="btn btn-primary" id="borrowBtn" style="flex:1">📤 대출</button>
                <button class="btn btn-success" id="returnBtn" style="flex:1">📥 반납</button>
                <button class="btn btn-warning" id="extendBtn" style="flex:1">🔄 연장</button>
            </div>
        </div>

        <!-- 관리자 패널 -->
        <div class="card" id="adminSection" style="display:none; border: 2px solid var(--warning);">
            <div class="card-title" style="display:flex; justify-content:space-between; align-items:center;">
                <span>🛠️ 관리자 메뉴</span>
                <button class="btn btn-sm btn-outline" id="adminLogoutBtn">나가기</button>
            </div>
            <div class="tabs">
                <button class="tab-btn active" data-tab="register">신규 등록</button>
                <button class="tab-btn" data-tab="edit">수정 · 삭제</button>
                <button class="tab-btn" data-tab="csv">CSV</button>
            </div>

            <!-- 등록 탭 -->
            <div class="tab-pane active" id="tab-register">
                <div class="form-group">
                    <label>ISBN으로 자동 입력</label>
                    <div class="isbn-row">
                        <input type="text" id="isbnInput" placeholder="ISBN 13자리 입력 후 검색">
                        <button class="btn btn-info btn-sm" id="isbnSearchBtn">🔍 검색</button>
                    </div>
                    <div class="isbn-loading" id="isbnLoading">🔄 도서 정보 검색 중...</div>
                </div>
                <div class="form-group">
                    <label>등록 번호 *</label>
                    <input type="text" id="newBookId" placeholder="예: A001">
                </div>
                <div class="form-group">
                    <label>도서/물품명 *</label>
                    <input type="text" id="newBookTitle" placeholder="제목 입력">
                </div>
                <div class="form-group">
                    <label>저자</label>
                    <input type="text" id="newBookAuthor" placeholder="저자명">
                </div>
                <div class="form-group">
                    <label>출판사</label>
                    <input type="text" id="newBookPublisher" placeholder="출판사명">
                </div>
                <div class="form-group">
                    <label>장르</label>
                    <select id="newBookGenre">
                        <option value="일반소설">일반소설</option>
                        <option value="취미">취미</option>
                        <option value="무협소설">무협소설</option>
                        <option value="무협만화">무협만화</option>
                        <option value="일반만화">일반만화</option>
                        <option value="시집">시집</option>
                        <option value="잡지">잡지</option>
                        <option value="단편">단편</option>
                        <option value="기타" selected>기타</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>보유 병동</label>
                    <select id="newBookWard">
                        <option value="2병동">2병동</option>
                        <option value="3병동">3병동</option>
                        <option value="4병동">4병동</option>
                        <option value="5병동">5병동</option>
                        <option value="사회사업실">사회사업실 보관</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>비고</label>
                    <textarea id="newBookNote" placeholder="메모 (선택)"></textarea>
                </div>
                <button class="btn btn-primary btn-full" id="registerBtn" type="button">✅ 등록하기</button>
            </div>

            <!-- 수정/삭제 탭 -->
            <div class="tab-pane" id="tab-edit">
                <div class="form-group">
                    <label>대상 등록번호</label>
                    <input type="text" id="editBookId" placeholder="수정/삭제할 번호 입력">
                </div>
                <div class="form-group">
                    <label>새 도서명</label>
                    <input type="text" id="editBookTitle" placeholder="변경할 이름">
                </div>
                <div class="form-group">
                    <label>새 저자</label>
                    <input type="text" id="editBookAuthor" placeholder="변경할 저자">
                </div>
                <div class="form-group">
                    <label>새 출판사</label>
                    <input type="text" id="editBookPublisher" placeholder="변경할 출판사">
                </div>
                <div class="form-group">
                    <label>장르</label>
                    <select id="editBookGenre">
                        <option value="">-- 변경 안 함 --</option>
                        <option value="일반소설">일반소설</option>
                        <option value="취미">취미</option>
                        <option value="무협소설">무협소설</option>
                        <option value="무협만화">무협만화</option>
                        <option value="일반만화">일반만화</option>
                        <option value="시집">시집</option>
                        <option value="잡지">잡지</option>
                        <option value="단편">단편</option>
                        <option value="기타">기타</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>보유 병동</label>
                    <select id="editBookWard">
                        <option value="">-- 변경 안 함 --</option>
                        <option value="2병동">2병동</option>
                        <option value="3병동">3병동</option>
                        <option value="4병동">4병동</option>
                        <option value="5병동">5병동</option>
                        <option value="사회사업실">사회사업실 보관</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>비고</label>
                    <textarea id="editBookNote" placeholder="비고 수정 (빈칸이면 유지)"></textarea>
                </div>
                <div class="btn-group">
                    <button class="btn btn-info btn-full" id="editBtn" type="button" style="flex:1">✏️ 수정</button>
                    <button class="btn btn-danger btn-full" id="deleteBtn" type="button" style="flex:1">🗑️ 삭제</button>
                </div>
            </div>

            <!-- CSV 탭 -->
            <div class="tab-pane" id="tab-csv">
                <div style="margin-bottom:16px">
                    <div class="modal-section-title">📤 데이터 내보내기</div>
                    <p style="font-size:0.82rem; color:var(--text2); margin-bottom:8px">현재 등록된 전체 도서 목록을 CSV로 저장합니다.</p>
                    <button class="btn btn-success btn-full" id="exportCsvBtn" type="button">CSV 파일로 저장</button>
                </div>
                <div>
                    <div class="modal-section-title">📥 데이터 가져오기</div>
                    <div class="csv-area">
                        <input type="file" id="csvFileInput" accept=".csv" style="display:none">
                        <button class="btn btn-outline" type="button" onclick="document.getElementById('csvFileInput').click()">📂 CSV 파일 선택</button>
                        <p>컬럼 순서: 등록번호, 도서명, 저자, 출판사, 장르, 병동, 비고</p>
                    </div>
                    <button class="btn btn-warning btn-full" id="importCsvBtn" type="button" style="margin-top:8px">⬆️ 가져오기 실행</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 우측 -->
    <div class="right-panel">
        <div class="card">
            <div class="stat-row">
                <div class="stat-card primary"><div class="num" id="statTotal">0</div><div class="lbl">전체</div></div>
                <div class="stat-card danger"><div class="num" id="statBorrowed">0</div><div class="lbl">대출 중</div></div>
                <div class="stat-card warning"><div class="num" id="statAvailable">0</div><div class="lbl">대출 가능</div></div>
                <div class="stat-card overdue"><div class="num" id="statOverdue">0</div><div class="lbl">연체</div></div>
            </div>
        </div>

        <div class="card">
            <div class="card-title" style="display:flex; justify-content:space-between; align-items:center;">
                <span>📋 현황 목록</span>
                <span class="count-badge" id="visibleCount">0건</span>
            </div>
            <div class="filter-bar">
                <input type="text" id="searchInput" placeholder="🔍 도서명, 번호, 대출자 검색">
                <select id="wardFilter">
                    <option value="전체">전체 병동</option>
                    <option value="2병동">2병동</option>
                    <option value="3병동">3병동</option>
                    <option value="4병동">4병동</option>
                    <option value="5병동">5병동</option>
                    <option value="사회사업실">사회사업실</option>
                </select>
                <select id="statusFilter">
                    <option value="전체">모든 상태</option>
                    <option value="대출 가능">대출 가능</option>
                    <option value="대출 중">대출 중</option>
                    <option value="연장">연장</option>

<div class="modal-overlay" id="scanModal">
    <div class="modal">
        <div class="modal-header">

            <div id="modalEditArea" style="display:none">
                <div class="form-group" style="margin-top:8px"><label>도서명</label><input type="text" id="modalEditTitle"></div>
                <div class="form-group"><label>저자</label><input type="text" id="modalEditAuthor"></div>
                <div class="form-group"><label>출판사</label><input type="text" id="modalEditPublisher"></div>
                <div class="form-group">
                    <label>장르</label>
                    <select id="modalEditGenre">
                        <option value="일반소설">일반소설</option>
                        <option value="취미">취미</option>
                        <option value="무협소설">무협소설</option>
                        <option value="무협만화">무협만화</option>
                        <option value="일반만화">일반만화</option>
                        <option value="시집">시집</option>
                        <option value="잡지">잡지</option>
                        <option value="단편">단편</option>
                        <option value="기타">기타</option>

                    <label>보유 병동</label>

                        <option value="2병동">2병동</option>
                        <option value="3병동">3병동</option>
                        <option value="4병동">4병동</option>
                        <option value="5병동">5병동</option>
                        <option value="사회사업실">사회사업실 보관</option>
                    </select>
                </div>
                <div class="form-group"><label>비고</label><textarea id="modalEditNote"></textarea></div>
                <button class="btn btn-info btn-full" id="modalSaveBtn" type="button">💾 저장</button>
            </div>

</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
    import { getFirestore, doc, getDoc, updateDoc, collection, onSnapshot, setDoc, deleteDoc }
        from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCVAR3-Gdh5fhOsXY76J1HgUQfg-dgncK8",
        authDomain: "bookreturnsystem.firebaseapp.com",
        projectId: "bookreturnsystem",
        storageBucket: "bookreturnsystem.firebasestorage.app",
        messagingSenderId: "676479956094",
        appId: "1:676479956094:web:205b6e57d7a3eeb1cb542f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    /* ── 유틸 ── */
    let msgTimer;
    function showMsg(text, type) {
        const bar = document.getElementById('msgBar');
        bar.textContent = text;
        bar.className = 'show ' + (type || '');
        clearTimeout(msgTimer);
        msgTimer = setTimeout(function() { bar.className = ''; }, 3500);
    }

    function today() { return new Date().toISOString().slice(0, 10); }
    function fmtDate(d) { return d ? d.replace(/-/g, '.') : '-'; }

    /* 연체 판단: 연장일로부터 7일 초과 */
    function isOverdue(book) {
        if (book.status !== '연장' && book.status !== '대출 중') return false;
        const baseDate = book.extendDate || book.borrowDate;
        if (!baseDate) return false;
        const diffMs = new Date() - new Date(baseDate);
        return diffMs > 7 * 24 * 60 * 60 * 1000;
    }

    /* 실제 표시 상태 (연체 포함) */
    function getDisplayStatus(book) {
        if (isOverdue(book)) return '연체';
        return book.status;
    }

    function getStatusBadge(displayStatus) {
        if (displayStatus === '대출 중') return '<span class="status-badge s-borrowed">● 대출 중</span>';
        if (displayStatus === '연장')   return '<span class="status-badge s-extended">● 연장</span>';
        if (displayStatus === '연체')   return '<span class="status-badge s-overdue">● 연체</span>';
        return '<span class="status-badge s-available">● 대출 가능</span>';
    }

    /* ── 전역 데이터 ── */
    let allBooks = [];
    let currentModalId = null;
    let csvData = null;

    /* ── 탭 전환 ── */
    document.querySelectorAll('.tab-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
            const tab = btn.dataset.tab;
            document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
            document.querySelectorAll('.tab-pane').forEach(function(p) { p.classList.remove('active'); });
            btn.classList.add('active');
            document.getElementById('tab-' + tab).classList.add('active');
        });
    });

    /* ── 관리자 ── */
    document.getElementById('adminLoginBtn').addEventListener('click', function() {
        const pw = prompt('관리자 비밀번호를 입력하세요:');
        if (pw === '1234') {
            document.getElementById('adminSection').style.display = 'block';
            document.getElementById('adminLoginBtn').style.display = 'none';
            showMsg('관리자 모드 활성화', 'success');
        } else if (pw !== null) {
            showMsg('비밀번호가 틀렸습니다.', 'error');
        }
    });
    document.getElementById('adminLogoutBtn').addEventListener('click', function() {
        document.getElementById('adminSection').style.display = 'none';
        document.getElementById('adminLoginBtn').style.display = 'block';
        showMsg('관리자 모드 종료');
    });

    /* ── 대출/반납/연장 ── */
    async function processBook(actionType, bookIdOverride, borrowerOverride) {
        const bookId = bookIdOverride || document.getElementById('bookId').value.trim();
        const borrowerName = borrowerOverride || document.getElementById('borrowerName').value.trim();
        if (!bookId) { showMsg('번호를 입력해주세요!', 'error'); return false; }
        if (actionType === 'borrow' && !borrowerName) { showMsg('대출자 이름을 입력해주세요!', 'error'); return false; }
        try {
            const bRef = doc(db, 'books', bookId);
            const bSnap = await getDoc(bRef);
            if (!bSnap.exists()) { showMsg('등록되지 않은 번호입니다.', 'error'); return false; }
            const data = bSnap.data();
            if (actionType === 'borrow') {
                if (data.status === '대출 가능') {
                    await updateDoc(bRef, { status: '대출 중', borrower: borrowerName, borrowDate: today(), extendDate: '' });
                    showMsg('[' + data.title + '] → ' + borrowerName + '님 대출 완료', 'success');
                } else {
                    showMsg('현재 ' + (data.borrower || '') + '님이 대출 중입니다.', 'error'); return false;
                }
            } else if (actionType === 'return') {
                if (data.status !== '대출 가능') {
                    await updateDoc(bRef, { status: '대출 가능', borrower: '', borrowDate: '', extendDate: '' });
                    showMsg('[' + data.title + '] 반납 완료!', 'success');
                } else {
                    showMsg('이미 반납된 물품입니다.', 'warning'); return false;
                }
            } else if (actionType === 'extend') {
                if (data.status === '대출 중' || data.status === '연장') {
                    await updateDoc(bRef, { status: '연장', extendDate: today() });
                    showMsg('[' + data.title + '] 연장 처리 완료 (7일 후 연체)', 'success');
                } else {
                    showMsg('대출 중인 항목만 연장 가능합니다.', 'warning'); return false;
                }
            }
            if (!bookIdOverride) {
                document.getElementById('bookId').value = '';
                document.getElementById('bookId').focus();
            }
            return true;
        } catch (e) {
            console.error(e);
            showMsg('오류: ' + e.message, 'error');
            return false;
        }
    }

    document.getElementById('borrowBtn').addEventListener('click', function() { processBook('borrow'); });
    document.getElementById('returnBtn').addEventListener('click', function() { processBook('return'); });
    document.getElementById('extendBtn').addEventListener('click', function() { processBook('extend'); });

    /* 엔터: 모달 오픈 */
    document.getElementById('bookId').addEventListener('keydown', async function(e) {
        if (e.key !== 'Enter') return;
        const bookId = document.getElementById('bookId').value.trim();
        if (!bookId) return;
        const bSnap = await getDoc(doc(db, 'books', bookId));
        if (bSnap.exists()) {
            openScanModal(bookId, bSnap.data());
        } else {
            showMsg('등록되지 않은 번호입니다.', 'error');
        }
    });

    /* ── 스캔 모달 ── */
    function openScanModal(bookId, data) {
        currentModalId = bookId;
        document.getElementById('modalTitle').textContent = data.title || '(제목 없음)';
        document.getElementById('modalBookId').textContent = '# ' + bookId;
        const displayStatus = getDisplayStatus(data);
        document.getElementById('modalInfoGrid').innerHTML =
            '<div class="modal-info-item"><div class="lbl">저자</div><div class="val">' + (data.author || '-') + '</div></div>' +
            '<div class="modal-info-item"><div class="lbl">출판사</div><div class="val">' + (data.publisher || '-') + '</div></div>' +
            '<div class="modal-info-item"><div class="lbl">장르</div><div class="val"><span class="genre-badge g-' + (data.genre || '기타') + '">' + (data.genre || '기타') + '</span></div></div>' +
            '<div class="modal-info-item"><div class="lbl">병동</div><div class="val"><span class="ward-badge">' + (data.ward || '-') + '</span></div></div>' +
            '<div class="modal-info-item"><div class="lbl">상태</div><div class="val">' + getStatusBadge(displayStatus) + '</div></div>' +
            '<div class="modal-info-item"><div class="lbl">대출자</div><div class="val">' + (data.borrower || '-') + '</div></div>' +
            '<div class="modal-info-item"><div class="lbl">대출일</div><div class="val">' + fmtDate(data.borrowDate) + '</div></div>' +
            '<div class="modal-info-item"><div class="lbl">연장일</div><div class="val">' + fmtDate(data.extendDate) + '</div></div>' +
            (data.note ? '<div class="modal-info-item" style="grid-column:span 2"><div class="lbl">비고</div><div class="val">' + data.note + '</div></div>' : '');

        const canBorrow = data.status === '대출 가능';
        document.getElementById('modalBorrowBtn').style.display = canBorrow ? 'flex' : 'none';
        document.getElementById('modalReturnBtn').style.display = !canBorrow ? 'flex' : 'none';
        document.getElementById('modalExtendBtn').style.display = (!canBorrow && data.status !== '대출 가능') ? 'flex' : 'none';
        document.getElementById('modalBorrowerRow').style.display = canBorrow ? 'block' : 'none';
        document.getElementById('modalBorrowerName').value = '';

        document.getElementById('modalEditTitle').value = data.title || '';
        document.getElementById('modalEditAuthor').value = data.author || '';
        document.getElementById('modalEditPublisher').value = data.publisher || '';
        document.getElementById('modalEditGenre').value = data.genre || '기타';
        document.getElementById('modalEditWard').value = data.ward || '2병동';
        document.getElementById('modalEditNote').value = data.note || '';
        document.getElementById('modalEditArea').style.display = 'none';
        document.getElementById('modalEditToggle').textContent = '✏️ 세부 정보 수정';
        document.getElementById('scanModal').classList.add('open');
    }

    document.getElementById('modalClose').addEventListener('click', function() {
        document.getElementById('scanModal').classList.remove('open');
        document.getElementById('bookId').value = '';
        document.getElementById('bookId').focus();
    });
    document.getElementById('scanModal').addEventListener('click', function(e) {
        if (e.target === e.currentTarget) {
            document.getElementById('scanModal').classList.remove('open');
            document.getElementById('bookId').value = '';
        }
    });
    document.getElementById('modalBorrowBtn').addEventListener('click', async function() {
        const name = document.getElementById('modalBorrowerName').value.trim();
        if (!name) { showMsg('이름을 입력해주세요', 'error'); return; }
        const ok = await processBook('borrow', currentModalId, name);
        if (ok) document.getElementById('scanModal').classList.remove('open');
    });
    document.getElementById('modalReturnBtn').addEventListener('click', async function() {
        const ok = await processBook('return', currentModalId, '');
        if (ok) document.getElementById('scanModal').classList.remove('open');
    });
    document.getElementById('modalExtendBtn').addEventListener('click', async function() {
        const ok = await processBook('extend', currentModalId, '');
        if (ok) document.getElementById('scanModal').classList.remove('open');
    });
    document.getElementById('modalEditToggle').addEventListener('click', function() {
        const area = document.getElementById('modalEditArea');
        const isOpen = area.style.display !== 'none';
        area.style.display = isOpen ? 'none' : 'block';
        document.getElementById('modalEditToggle').textContent = isOpen ? '✏️ 세부 정보 수정' : '▲ 닫기';
    });
    document.getElementById('modalSaveBtn').addEventListener('click', async function() {
        if (!currentModalId) return;
        const updates = {
            title: document.getElementById('modalEditTitle').value.trim(),
            author: document.getElementById('modalEditAuthor').value.trim(),
            publisher: document.getElementById('modalEditPublisher').value.trim(),
            genre: document.getElementById('modalEditGenre').value,
            ward: document.getElementById('modalEditWard').value,
            note: document.getElementById('modalEditNote').value.trim(),
        };
        if (!updates.title) { showMsg('도서명을 입력해주세요', 'error'); return; }
        try {
            await updateDoc(doc(db, 'books', currentModalId), updates);
            showMsg('저장 완료!', 'success');
            document.getElementById('scanModal').classList.remove('open');
        } catch (e) { showMsg('저장 실패: ' + e.message, 'error'); }
    });

    /* ── ISBN 검색 ── */
    document.getElementById('isbnSearchBtn').addEventListener('click', fetchIsbn);
    document.getElementById('isbnInput').addEventListener('keydown', function(e) { if (e.key === 'Enter') { e.preventDefault(); fetchIsbn(); } });

    async function fetchIsbn() {
        const isbn = document.getElementById('isbnInput').value.trim().replace(/[-\s]/g, '');
        if (!isbn) { showMsg('ISBN을 입력해주세요', 'error'); return; }
        const loading = document.getElementById('isbnLoading');
        loading.style.display = 'block';
        try {
            const res = await fetch('https://openlibrary.org/api/books?bibkeys=ISBN:' + isbn + '&format=json&jscmd=data');
            const data = await res.json();
            const key = 'ISBN:' + isbn;
            if (data[key]) {
                const book = data[key];
                document.getElementById('newBookTitle').value = book.title || '';
                document.getElementById('newBookAuthor').value = (book.authors || []).map(function(a) { return a.name; }).join(', ');
                document.getElementById('newBookPublisher').value = (book.publishers || []).map(function(p) { return p.name; }).join(', ');
                showMsg('도서 정보 자동 입력 완료!', 'success');
            } else {
                showMsg('Open Library에서 찾을 수 없습니다. 직접 입력해주세요.', 'warning');
            }
        } catch (e) {
            showMsg('검색 중 오류가 발생했습니다.', 'error');
        } finally {
            loading.style.display = 'none';
        }
    }

    /* ── 등록 ── */
    document.getElementById('registerBtn').addEventListener('click', async function() {
        const regId    = document.getElementById('newBookId').value.trim();
        const regTitle = document.getElementById('newBookTitle').value.trim();
        if (!regId)    { showMsg('등록 번호를 입력해주세요.', 'error'); return; }
        if (!regTitle) { showMsg('도서/물품명을 입력해주세요.', 'error'); return; }
        try {
            showMsg('등록 중...', '');
            const regRef  = doc(db, 'books', regId);
            const regSnap = await getDoc(regRef);
            if (regSnap.exists()) { showMsg('이미 등록된 번호입니다.', 'error'); return; }
            await setDoc(regRef, {
                ward:      document.getElementById('newBookWard').value,
                title:     regTitle,
                author:    document.getElementById('newBookAuthor').value.trim(),
                publisher: document.getElementById('newBookPublisher').value.trim(),
                genre:     document.getElementById('newBookGenre').value,
                note:      document.getElementById('newBookNote').value.trim(),
                status:    '대출 가능',
                borrower:  '',
                borrowDate: '',
                extendDate: '',
            });
            showMsg('[' + regTitle + '] 등록 완료!', 'success');
            ['newBookId','newBookTitle','newBookAuthor','newBookPublisher','newBookNote','isbnInput'].forEach(function(fid) {
                document.getElementById(fid).value = '';
            });
        } catch (err) {
            console.error('등록 오류:', err);
            showMsg('등록 실패: ' + err.message, 'error');
        }
    });

    /* ── 수정 ── */
    document.getElementById('editBtn').addEventListener('click', async function() {
        try {
            const eId = document.getElementById('editBookId').value.trim();
            if (!eId) { showMsg('대상 번호를 입력해주세요.', 'error'); return; }
            const eRef  = doc(db, 'books', eId);
            const eSnap = await getDoc(eRef);
            if (!eSnap.exists()) { showMsg('존재하지 않는 번호입니다.', 'error'); return; }
            const updates = {};
            const eTitle     = document.getElementById('editBookTitle').value.trim();
            const eAuthor    = document.getElementById('editBookAuthor').value.trim();
            const ePublisher = document.getElementById('editBookPublisher').value.trim();
            const eGenre     = document.getElementById('editBookGenre').value;
            const eWard      = document.getElementById('editBookWard').value;
            const eNote      = document.getElementById('editBookNote').value.trim();
            if (eTitle)     updates.title     = eTitle;
            if (eAuthor)    updates.author    = eAuthor;
            if (ePublisher) updates.publisher = ePublisher;
            if (eGenre)     updates.genre     = eGenre;
            if (eWard)      updates.ward      = eWard;
            if (eNote)      updates.note      = eNote;
            if (Object.keys(updates).length === 0) { showMsg('수정할 내용을 입력해주세요.', 'warning'); return; }
            await updateDoc(eRef, updates);
            showMsg('수정 완료!', 'success');
            ['editBookId','editBookTitle','editBookAuthor','editBookPublisher','editBookNote'].forEach(function(fid) {
                document.getElementById(fid).value = '';
            });
            document.getElementById('editBookGenre').value = '';
            document.getElementById('editBookWard').value = '';
        } catch (err) {
            console.error('수정 오류:', err);
            showMsg('수정 실패: ' + err.message, 'error');
        }
    });

    /* ── 삭제 ── */
    document.getElementById('deleteBtn').addEventListener('click', async function() {
        try {
            const dId = document.getElementById('editBookId').value.trim();
            if (!dId) { showMsg('삭제할 번호를 입력해주세요.', 'error'); return; }
            if (!confirm('정말 [' + dId + '] 항목을 삭제하시겠습니까?')) return;
            const dRef  = doc(db, 'books', dId);
            const dSnap = await getDoc(dRef);
            if (!dSnap.exists()) { showMsg('존재하지 않는 번호입니다.', 'error'); return; }
            await deleteDoc(dRef);
            showMsg('삭제 완료', 'success');
            document.getElementById('editBookId').value = '';
        } catch (err) {
            console.error('삭제 오류:', err);
            showMsg('삭제 실패: ' + err.message, 'error');
        }
    });

    /* ── CSV 내보내기 ── */
    document.getElementById('exportCsvBtn').addEventListener('click', function() {
        const headers = ['등록번호','도서명','저자','출판사','장르','병동','상태','대출자','대출일','연장일','비고'];
        const rows = allBooks.map(function(b) {
            return [b.id, b.title, b.author||'', b.publisher||'', b.genre||'', b.ward||'',
                    b.status||'', b.borrower||'', b.borrowDate||'', b.extendDate||'', b.note||''];
        });
        const csv = [headers].concat(rows).map(function(r) {
            return r.map(function(v) { return '"' + String(v).replace(/"/g, '""') + '"'; }).join(',');
        }).join('\n');
        const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = '도서현황_' + today() + '.csv';
        a.click();
        showMsg('CSV 저장 완료!', 'success');
    });

    /* ── CSV 가져오기 ── */
    document.getElementById('csvFileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(ev) {
            csvData = ev.target.result;
            showMsg('파일 로드 완료: ' + file.name, 'success');
        };
        reader.readAsText(file, 'UTF-8');
    });

    document.getElementById('importCsvBtn').addEventListener('click', async function() {
        if (!csvData) { showMsg('CSV 파일을 먼저 선택해주세요.', 'error'); return; }
        if (!confirm('CSV 데이터를 Firestore에 등록합니다. 기존 데이터는 덮어씁니다. 계속하시겠습니까?')) return;
        const lines = csvData.split('\n').filter(function(l) { return l.trim(); });
        const dataLines = lines.slice(1);
        let count = 0;
        for (let i = 0; i < dataLines.length; i++) {
            const cols = dataLines[i].split(',').map(function(c) { return c.trim().replace(/^"|"$/g, '').replace(/""/g, '"'); });
            const cId = cols[0], cTitle = cols[1], cAuthor = cols[2]||'', cPublisher = cols[3]||'',
                  cGenre = cols[4]||'기타', cWard = cols[5]||'미지정', cNote = cols[6]||'';
            if (!cId || !cTitle) continue;
            await setDoc(doc(db, 'books', cId), {
                title: cTitle, author: cAuthor, publisher: cPublisher,
                genre: cGenre, ward: cWard, note: cNote,
                status: '대출 가능', borrower: '', borrowDate: '', extendDate: ''
            }, { merge: true });
            count++;
        }
        showMsg(count + '건 가져오기 완료!', 'success');
        csvData = null;
        document.getElementById('csvFileInput').value = '';
    });

    /* ── 실시간 데이터 ── */
    const booksCol = collection(db, 'books');
    onSnapshot(booksCol, function(snapshot) {
        allBooks = [];
        snapshot.forEach(function(d) { allBooks.push(Object.assign({ id: d.id }, d.data())); });
        allBooks.sort(function(a, b) { return a.id.localeCompare(b.id); });
        updateStats();
        renderTable();
    });

    function updateStats() {
        const borrowed  = allBooks.filter(function(b) { return b.status === '대출 중' || b.status === '연장'; }).length;
        const overdueN  = allBooks.filter(function(b) { return isOverdue(b); }).length;
        document.getElementById('statTotal').textContent     = allBooks.length;
        document.getElementById('statBorrowed').textContent  = borrowed;
        document.getElementById('statAvailable').textContent = allBooks.length - borrowed;
        document.getElementById('statOverdue').textContent   = overdueN;
    }

    /* ── 테이블 렌더링 ── */
    function renderTable() {
        const search = document.getElementById('searchInput').value.toLowerCase();
        const ward   = document.getElementById('wardFilter').value;
        const statusF = document.getElementById('statusFilter').value;
        const genre  = document.getElementById('genreFilter').value;

        const filtered = allBooks.filter(function(b) {
            const ds = getDisplayStatus(b);
            if (ward !== '전체' && b.ward !== ward) return false;
            if (statusF !== '전체' && ds !== statusF) return false;
            if (genre !== '전체' && b.genre !== genre) return false;
            if (search) {
                const hay = (b.id + ' ' + b.title + ' ' + (b.author||'') + ' ' + (b.borrower||'')).toLowerCase();
                if (!hay.includes(search)) return false;
            }
            return true;
        });

        document.getElementById('visibleCount').textContent = filtered.length + '건';
        const tbody = document.getElementById('bookListBody');

        if (filtered.length === 0) {
            tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; color:var(--text3); padding:30px">검색 결과가 없습니다.</td></tr>';
            return;
        }

        tbody.innerHTML = filtered.map(function(b) {
            const ds = getDisplayStatus(b);
            const overdueClass = ds === '연체' ? ' overdue-row' : '';
            const dateStr = (b.extendDate || b.borrowDate) ? fmtDate(b.extendDate || b.borrowDate) : '-';
            return '<tr class="' + overdueClass + '" style="cursor:pointer" onclick="window._openBook(\'' + b.id + '\')">' +
                '<td class="mono">' + b.id + '</td>' +
                '<td><span class="genre-badge g-' + (b.genre||'기타') + '">' + (b.genre||'기타') + '</span></td>' +
                '<td style="font-weight:500">' + b.title + '</td>' +
                '<td class="hide-mobile" style="color:var(--text2)">' + (b.author||'-') + '</td>' +
                '<td class="hide-mobile"><span class="ward-badge">' + (b.ward||'-') + '</span></td>' +
                '<td>' + getStatusBadge(ds) + '</td>' +
                '<td style="color:var(--text2)">' + (b.borrower||'-') + '</td>' +
                '<td class="hide-mobile mono" style="color:var(--text3); font-size:0.75rem">' + dateStr + '</td>' +
                '</tr>';
        }).join('');
    }

    window._openBook = async function(bookId) {
        const bSnap = await getDoc(doc(db, 'books', bookId));
        if (bSnap.exists()) {
            document.getElementById('bookId').value = bookId;
            openScanModal(bookId, bSnap.data());
        }
    };

    ['searchInput','wardFilter','statusFilter','genreFilter'].forEach(function(eid) {
        document.getElementById(eid).addEventListener('input', renderTable);
    });
</script>
</body>
</html>
