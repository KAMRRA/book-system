<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>병동 도서 관리 시스템</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f4f3ef;
            --surface: #ffffff;
            --surface2: #f9f8f5;
            --border: #e0ddd6;
            --text: #1a1a1a;
            --text2: #666;
            --text3: #999;
            --primary: #2d6a4f;
            --primary-light: #52b788;
            --primary-pale: #d8f3dc;
            --danger: #c0392b;
            --danger-pale: #fdecea;
            --warning: #e67e22;
            --warning-pale: #fef5ec;
            --info: #2980b9;
            --info-pale: #eaf4fb;
            --success: #27ae60;
            --success-pale: #eafaf1;
            --radius: 10px;
            --shadow: 0 2px 12px rgba(0,0,0,0.08);
            --shadow-lg: 0 8px 30px rgba(0,0,0,0.15);

            /* 장르 색상 */
            --g-novel: #e63946;
            --g-humanities: #457b9d;
            --g-selfdev: #2a9d8f;
            --g-health: #e9c46a;
            --g-science: #6a4c93;
            --g-history: #f4a261;
            --g-economy: #264653;
            --g-art: #e76f51;
            --g-children: #06d6a0;
            --g-etc: #adb5bd;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ── 헤더 ── */
        .app-header {
            background: var(--primary);
            color: white;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .app-header h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: -0.3px; }
        .app-header .sub { font-size: 0.75rem; opacity: 0.8; margin-top: 2px; }
        .header-actions { display: flex; gap: 8px; align-items: center; }
        .btn-icon {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            font-family: inherit;
            transition: background 0.2s;
        }
        .btn-icon:hover { background: rgba(255,255,255,0.25); }

        /* ── 레이아웃 ── */
        .app-body {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px 16px;
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 20px;
        }
        @media (max-width: 768px) {
            .app-body { grid-template-columns: 1fr; }
        }

        .card {
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 20px;
            border: 1px solid var(--border);
        }
        .card-title {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text3);
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        /* ── 폼 요소 ── */
        .form-group { margin-bottom: 12px; }
        .form-group label {
            display: block;
            font-size: 0.78rem;
            font-weight: 500;
            color: var(--text2);
            margin-bottom: 4px;
        }
        input[type=text], input[type=date], select, textarea {
            width: 100%;
            padding: 9px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.9rem;
            font-family: inherit;
            background: var(--surface);
            color: var(--text);
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-light);
            box-shadow: 0 0 0 3px rgba(82,183,136,0.15);
        }
        textarea { resize: vertical; min-height: 60px; }

        .btn {
            padding: 9px 16px;
            border: none;
            border-radius: 6px;
            font-size: 0.85rem;
            font-family: inherit;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: #245e44; }
        .btn-success { background: var(--success); color: white; }
        .btn-success:hover { background: #219a52; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-danger:hover { background: #a93226; }
        .btn-warning { background: var(--warning); color: white; }
        .btn-warning:hover { background: #ca6f1e; }
        .btn-info { background: var(--info); color: white; }
        .btn-info:hover { background: #2471a3; }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text2);
        }
        .btn-outline:hover { background: var(--surface2); }
        .btn-full { width: 100%; justify-content: center; }
        .btn-sm { padding: 5px 10px; font-size: 0.78rem; }

        .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }

        /* ── 메시지 바 ── */
        #msgBar {
            position: fixed;
            top: 64px;
            left: 50%;
            transform: translateX(-50%) translateY(-10px);
            background: #1a1a1a;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 0.88rem;
            font-weight: 500;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s;
            z-index: 9999;
            white-space: nowrap;
            max-width: 90vw;
        }
        #msgBar.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        #msgBar.success { background: var(--success); }
        #msgBar.error { background: var(--danger); }
        #msgBar.warning { background: var(--warning); }

        /* ── 장르 배지 ── */
        .genre-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.72rem;
            font-weight: 600;
            color: white;
        }
        .g-소설 { background: var(--g-novel); }
        .g-인문 { background: var(--g-humanities); }
        .g-자기계발 { background: var(--g-selfdev); }
        .g-건강의학 { background: var(--g-health); color: #333; }
        .g-과학기술 { background: var(--g-science); }
        .g-역사 { background: var(--g-history); }
        .g-경제경영 { background: var(--g-economy); }
        .g-예술 { background: var(--g-art); }
        .g-아동청소년 { background: var(--g-children); color: #333; }
        .g-기타 { background: var(--g-etc); color: #333; }

        /* ── 상태 배지 ── */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 9px;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 600;
        }
        .s-available { background: var(--success-pale); color: var(--success); }
        .s-borrowed { background: var(--danger-pale); color: var(--danger); }
        .s-extended { background: var(--warning-pale); color: var(--warning); }

        /* ── 테이블 ── */
        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th {
            background: var(--surface2);
            padding: 10px 12px;
            text-align: left;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: 0.3px;
            border-bottom: 2px solid var(--border);
            white-space: nowrap;
        }
        td {
            padding: 11px 12px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }
        tr:hover td { background: var(--surface2); }
        tr:last-child td { border-bottom: none; }
        .mono { font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; }

        /* ── 필터 바 ── */
        .filter-bar {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 16px;
        }
        .filter-bar input, .filter-bar select {
            width: auto;
            flex: 1;
            min-width: 120px;
        }
        .count-badge {
            background: var(--primary-pale);
            color: var(--primary);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 700;
            white-space: nowrap;
        }

        /* ── 탭 ── */
        .tabs { display: flex; gap: 2px; margin-bottom: 16px; border-bottom: 2px solid var(--border); }
        .tab-btn {
            padding: 8px 16px;
            border: none;
            background: transparent;
            font-size: 0.85rem;
            font-family: inherit;
            font-weight: 500;
            color: var(--text3);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: all 0.2s;
        }
        .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 700; }
        .tab-pane { display: none; }
        .tab-pane.active { display: block; }

        /* ── 모달 ── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(3px);
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: var(--surface);
            border-radius: 14px;
            padding: 28px;
            width: 90%;
            max-width: 480px;
            box-shadow: var(--shadow-lg);
            animation: modalIn 0.25s ease;
        }
        @keyframes modalIn {
            from { transform: scale(0.94) translateY(10px); opacity: 0; }
            to { transform: scale(1) translateY(0); opacity: 1; }
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }
        .modal-title { font-size: 1.1rem; font-weight: 700; }
        .modal-book-id {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: var(--text3);
            margin-top: 3px;
        }
        .modal-close {
            background: none;
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            color: var(--text3);
            line-height: 1;
        }
        .modal-info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 20px;
            background: var(--surface2);
            border-radius: 8px;
            padding: 14px;
        }
        .modal-info-item { font-size: 0.82rem; }
        .modal-info-item .lbl { color: var(--text3); font-size: 0.73rem; margin-bottom: 2px; }
        .modal-info-item .val { font-weight: 500; }
        .modal-actions { display: flex; flex-direction: column; gap: 8px; }
        .modal-section-title {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text3);
            margin-bottom: 8px;
            margin-top: 12px;
        }

        /* ── ISBN 검색 ── */
        .isbn-row { display: flex; gap: 8px; }
        .isbn-row input { flex: 1; }
        .isbn-loading {
            font-size: 0.8rem;
            color: var(--text3);
            margin-top: 6px;
            display: none;
        }

        /* ── 우측 패널 ── */
        .right-panel { display: flex; flex-direction: column; gap: 20px; }

        /* ── CSV 영역 ── */
        .csv-area { border: 2px dashed var(--border); border-radius: 8px; padding: 20px; text-align: center; }
        .csv-area p { font-size: 0.85rem; color: var(--text3); margin-top: 8px; }

        /* ── 병동 배지 ── */
        .ward-badge {
            background: var(--surface2);
            border: 1px solid var(--border);
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.75rem;
            color: var(--text2);
        }

        /* ── 대출 현황 카드 ── */
        .stat-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 16px;
        }
        .stat-card {
            background: var(--surface2);
            border-radius: 8px;
            padding: 12px;
            text-align: center;
        }
        .stat-card .num { font-size: 1.6rem; font-weight: 700; line-height: 1; }
        .stat-card .lbl { font-size: 0.72rem; color: var(--text3); margin-top: 4px; }
        .stat-card.primary .num { color: var(--primary); }
        .stat-card.danger .num { color: var(--danger); }
        .stat-card.warning .num { color: var(--warning); }

        /* 스크롤바 */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        /* ── 반응형 테이블 감추기 ── */
        @media (max-width: 600px) {
            .hide-mobile { display: none; }
        }
    </style>
</head>
<body>

<!-- 메시지 바 -->
<div id="msgBar"></div>

<!-- 헤더 -->
<header class="app-header">
    <div>
        <h1>📚 병동 도서 관리 시스템</h1>
        <div class="sub">통합 물품 대출 · 반납 · 관리</div>
    </div>
    <div class="header-actions">
        <button class="btn-icon" id="adminLoginBtn">⚙️ 관리자</button>
    </div>
</header>

<!-- 본문 -->
<div class="app-body">

    <!-- 좌측: 대출/반납 + 관리자 -->
    <div class="left-panel">

        <!-- 대출 / 반납 카드 -->
        <div class="card" style="margin-bottom:20px">
            <div class="card-title">📖 대출 · 반납</div>
            <div class="form-group">
                <label>대출자 이름 (대출 시 필수)</label>
                <input type="text" id="borrowerName" placeholder="이름 입력">
            </div>
            <div class="form-group">
                <label>도서/물품 번호 (바코드 스캔 또는 입력)</label>
                <input type="text" id="bookId" placeholder="번호 스캔 후 Enter" autofocus>
            </div>
            <div class="btn-group">
                <button class="btn btn-primary" id="borrowBtn" style="flex:1">📤 대출</button>
                <button class="btn btn-success" id="returnBtn" style="flex:1">📥 반납</button>
                <button class="btn btn-warning" id="extendBtn" style="flex:1">🔄 연장</button>
            </div>
        </div>

        <!-- 관리자 패널 -->
        <div class="card" id="adminSection" style="display:none; border: 2px solid var(--warning);">
            <div class="card-title" style="display:flex; justify-content:space-between; align-items:center;">
                <span>🛠️ 관리자 메뉴</span>
                <button class="btn btn-sm btn-outline" id="adminLogoutBtn">나가기</button>
            </div>

            <div class="tabs">
                <button class="tab-btn active" data-tab="register">신규 등록</button>
                <button class="tab-btn" data-tab="edit">수정 · 삭제</button>
                <button class="tab-btn" data-tab="csv">CSV</button>
            </div>

            <!-- 등록 탭 -->
            <div class="tab-pane active" id="tab-register">
                <div class="form-group">
                    <label>ISBN으로 자동 입력</label>
                    <div class="isbn-row">
                        <input type="text" id="isbnInput" placeholder="ISBN 13자리 입력 후 검색">
                        <button class="btn btn-info btn-sm" id="isbnSearchBtn">🔍 검색</button>
                    </div>
                    <div class="isbn-loading" id="isbnLoading">🔄 도서 정보 검색 중...</div>
                </div>
                <div class="form-group">
                    <label>등록 번호 *</label>
                    <input type="text" id="newBookId" placeholder="예: A001">
                </div>
                <div class="form-group">
                    <label>도서/물품명 *</label>
                    <input type="text" id="newBookTitle" placeholder="제목 입력">
                </div>
                <div class="form-group">
                    <label>저자</label>
                    <input type="text" id="newBookAuthor" placeholder="저자명">
                </div>
                <div class="form-group">
                    <label>출판사</label>
                    <input type="text" id="newBookPublisher" placeholder="출판사명">
                </div>
                <div class="form-group">
                    <label>장르</label>
                    <select id="newBookGenre">
                        <option value="소설">소설</option>
                        <option value="인문">인문</option>
                        <option value="자기계발">자기계발</option>
                        <option value="건강의학">건강·의학</option>
                        <option value="과학기술">과학·기술</option>
                        <option value="역사">역사</option>
                        <option value="경제경영">경제·경영</option>
                        <option value="예술">예술</option>
                        <option value="아동청소년">아동·청소년</option>
                        <option value="기타" selected>기타</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>보유 병동</label>
                    <select id="newBookWard">
                        <option value="1병동">1병동</option>
                        <option value="2병동">2병동</option>
                        <option value="3병동">3병동</option>
                        <option value="공통">공통 구역</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>비고</label>
                    <textarea id="newBookNote" placeholder="메모 (선택)"></textarea>
                </div>
                <button class="btn btn-primary btn-full" id="registerBtn">✅ 등록하기</button>
            </div>

            <!-- 수정/삭제 탭 -->
            <div class="tab-pane" id="tab-edit">
                <div class="form-group">
                    <label>대상 등록번호</label>
                    <input type="text" id="editBookId" placeholder="수정/삭제할 번호 입력">
                </div>
                <div class="form-group">
                    <label>새 도서명</label>
                    <input type="text" id="editBookTitle" placeholder="변경할 이름">
                </div>
                <div class="form-group">
                    <label>새 저자</label>
                    <input type="text" id="editBookAuthor" placeholder="변경할 저자">
                </div>
                <div class="form-group">
                    <label>새 출판사</label>
                    <input type="text" id="editBookPublisher" placeholder="변경할 출판사">
                </div>
                <div class="form-group">
                    <label>장르</label>
                    <select id="editBookGenre">
                        <option value="">-- 변경 안 함 --</option>
                        <option value="소설">소설</option>
                        <option value="인문">인문</option>
                        <option value="자기계발">자기계발</option>
                        <option value="건강의학">건강·의학</option>
                        <option value="과학기술">과학·기술</option>
                        <option value="역사">역사</option>
                        <option value="경제경영">경제·경영</option>
                        <option value="예술">예술</option>
                        <option value="아동청소년">아동·청소년</option>
                        <option value="기타">기타</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>보유 병동</label>
                    <select id="editBookWard">
                        <option value="">-- 변경 안 함 --</option>
                        <option value="1병동">1병동</option>
                        <option value="2병동">2병동</option>
                        <option value="3병동">3병동</option>
                        <option value="공통">공통 구역</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>비고</label>
                    <textarea id="editBookNote" placeholder="비고 수정 (빈칸이면 유지)"></textarea>
                </div>
                <div class="btn-group">
                    <button class="btn btn-info btn-full" id="editBtn" style="flex:1">✏️ 수정</button>
                    <button class="btn btn-danger btn-full" id="deleteBtn" style="flex:1">🗑️ 삭제</button>
                </div>
            </div>

            <!-- CSV 탭 -->
            <div class="tab-pane" id="tab-csv">
                <div style="margin-bottom:16px">
                    <div class="modal-section-title">📤 데이터 내보내기</div>
                    <button class="btn btn-success btn-full" id="exportCsvBtn">CSV 파일로 저장</button>
                </div>
                <div>
                    <div class="modal-section-title">📥 데이터 가져오기</div>
                    <div class="csv-area">
                        <input type="file" id="csvFileInput" accept=".csv" style="display:none">
                        <button class="btn btn-outline" onclick="document.getElementById('csvFileInput').click()">📂 CSV 파일 선택</button>

<!-- ── Firebase + JS ── -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
    import { getFirestore, doc, getDoc, updateDoc, collection, onSnapshot, setDoc, deleteDoc }
        from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCVAR3-Gdh5fhOsXY76J1HgUQfg-dgncK8",
        authDomain: "bookreturnsystem.firebaseapp.com",
        projectId: "bookreturnsystem",
        storageBucket: "bookreturnsystem.firebasestorage.app",
        messagingSenderId: "676479956094",
        appId: "1:676479956094:web:205b6e57d7a3eeb1cb542f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    /* ── 유틸: 메시지 바 ── */
    let msgTimer;
    function showMsg(text, type = '') {
        const bar = document.getElementById('msgBar');
        bar.textContent = text;
        bar.className = 'show ' + type;
        clearTimeout(msgTimer);
        msgTimer = setTimeout(() => { bar.className = ''; }, 3500);
    }

    /* ── 유틸: 날짜 포맷 ── */
    function today() { return new Date().toISOString().slice(0, 10); }
    function fmtDate(d) { return d ? d.replace(/-/g, '.') : '-'; }

    /* ── 전역 데이터 ── */
    let allBooks = [];
    let currentModalId = null;
    let csvData = null;

    /* ── 탭 전환 ── */
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const tab = btn.dataset.tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('tab-' + tab).classList.add('active');
        });
    });

    /* ── 관리자 로그인/로그아웃 ── */
    document.getElementById('adminLoginBtn').addEventListener('click', () => {
        const pw = prompt('관리자 비밀번호를 입력하세요:');
        if (pw === '1234') {
            document.getElementById('adminSection').style.display = 'block';
            document.getElementById('adminLoginBtn').style.display = 'none';
            showMsg('관리자 모드 활성화', 'success');
        } else if (pw !== null) {
            showMsg('비밀번호가 틀렸습니다.', 'error');
        }
    });
    document.getElementById('adminLogoutBtn').addEventListener('click', () => {
        document.getElementById('adminSection').style.display = 'none';
        document.getElementById('adminLoginBtn').style.display = 'block';
        showMsg('관리자 모드 종료');
    });

    /* ── 대출/반납/연장 처리 ── */
    async function processBook(actionType, bookIdOverride, borrowerOverride) {
        const bookId = bookIdOverride || document.getElementById('bookId').value.trim();
        const borrowerName = borrowerOverride || document.getElementById('borrowerName').value.trim();

        if (!bookId) { showMsg('번호를 입력해주세요!', 'error'); return false; }
        if (actionType === 'borrow' && !borrowerName) { showMsg('대출자 이름을 입력해주세요!', 'error'); return false; }

        try {
            const docRef = doc(db, 'books', bookId);
            const docSnap = await getDoc(docRef);
            if (!docSnap.exists()) { showMsg('등록되지 않은 번호입니다.', 'error'); return false; }

            const data = docSnap.data();

            if (actionType === 'borrow') {
                if (data.status === '대출 가능') {
                    await updateDoc(docRef, { status: '대출 중', borrower: borrowerName, borrowDate: today(), extendDate: '' });
                    showMsg(`[${data.title}] → ${borrowerName}님 대출 완료`, 'success');
                } else {
                    showMsg(`현재 ${data.borrower}님이 대출 중입니다.`, 'error'); return false;
                }
            } else if (actionType === 'return') {
                if (data.status !== '대출 가능') {
                    await updateDoc(docRef, { status: '대출 가능', borrower: '', borrowDate: '', extendDate: '' });
                    showMsg(`[${data.title}] 반납 완료!`, 'success');
                } else {
                    showMsg('이미 반납된 물품입니다.', 'warning'); return false;
                }
            } else if (actionType === 'extend') {
                if (data.status === '대출 중' || data.status === '연장') {
                    await updateDoc(docRef, { status: '연장', extendDate: today() });
                    showMsg(`[${data.title}] 연장 처리 완료`, 'success');
                } else {
                    showMsg('대출 중인 항목만 연장 가능합니다.', 'warning'); return false;
                }
            }
            if (!bookIdOverride) {
                document.getElementById('bookId').value = '';
                document.getElementById('bookId').focus();
            }
            return true;
        } catch (e) {
            console.error(e);
            showMsg('오류가 발생했습니다.', 'error');
            return false;
        }
    }

    document.getElementById('borrowBtn').addEventListener('click', () => processBook('borrow'));
    document.getElementById('returnBtn').addEventListener('click', () => processBook('return'));
    document.getElementById('extendBtn').addEventListener('click', () => processBook('extend'));

    /* ── 엔터 키: 자동 판별 ── */
    document.getElementById('bookId').addEventListener('keydown', async (e) => {
        if (e.key !== 'Enter') return;
        const bookId = document.getElementById('bookId').value.trim();
        if (!bookId) return;

        const docRef = doc(db, 'books', bookId);
        const docSnap = await getDoc(docRef);

        if (docSnap.exists()) {
            // 바코드 스캔 시 모달 오픈
            openScanModal(bookId, docSnap.data());
        } else {
            showMsg('등록되지 않은 번호입니다.', 'error');
        }
    });

    /* ── 바코드 스캔 모달 ── */
    function openScanModal(bookId, data) {
        currentModalId = bookId;
        document.getElementById('modalTitle').textContent = data.title || '(제목 없음)';
        document.getElementById('modalBookId').textContent = '# ' + bookId;

        const infoGrid = document.getElementById('modalInfoGrid');
        infoGrid.innerHTML = `
            <div class="modal-info-item"><div class="lbl">저자</div><div class="val">${data.author || '-'}</div></div>
            <div class="modal-info-item"><div class="lbl">출판사</div><div class="val">${data.publisher || '-'}</div></div>
            <div class="modal-info-item"><div class="lbl">장르</div><div class="val"><span class="genre-badge g-${data.genre || '기타'}">${data.genre || '기타'}</span></div></div>
            <div class="modal-info-item"><div class="lbl">병동</div><div class="val"><span class="ward-badge">${data.ward || '-'}</span></div></div>
            <div class="modal-info-item"><div class="lbl">상태</div><div class="val">${getStatusBadge(data.status)}</div></div>
            <div class="modal-info-item"><div class="lbl">대출자</div><div class="val">${data.borrower || '-'}</div></div>
            <div class="modal-info-item"><div class="lbl">대출일</div><div class="val">${fmtDate(data.borrowDate)}</div></div>
            <div class="modal-info-item"><div class="lbl">연장일</div><div class="val">${fmtDate(data.extendDate)}</div></div>
            ${data.note ? `<div class="modal-info-item" style="grid-column:span 2"><div class="lbl">비고</div><div class="val">${data.note}</div></div>` : ''}
        `;

        // 버튼 표시 제어
        const canBorrow = data.status === '대출 가능';
        document.getElementById('modalBorrowBtn').style.display = canBorrow ? 'flex' : 'none';
        document.getElementById('modalReturnBtn').style.display = !canBorrow ? 'flex' : 'none';
        document.getElementById('modalExtendBtn').style.display = (!canBorrow) ? 'flex' : 'none';
        document.getElementById('modalBorrowerRow').style.display = canBorrow ? 'block' : 'none';
        document.getElementById('modalBorrowerName').value = '';

        // 수정 영역 채우기
        document.getElementById('modalEditTitle').value = data.title || '';
        document.getElementById('modalEditAuthor').value = data.author || '';
        document.getElementById('modalEditPublisher').value = data.publisher || '';
        document.getElementById('modalEditGenre').value = data.genre || '기타';
        document.getElementById('modalEditWard').value = data.ward || '1병동';
        document.getElementById('modalEditNote').value = data.note || '';
        document.getElementById('modalEditArea').style.display = 'none';
        document.getElementById('modalEditToggle').textContent = '✏️ 세부 정보 수정';

        document.getElementById('scanModal').classList.add('open');
    }

    function getStatusBadge(status) {
        if (status === '대출 중') return '<span class="status-badge s-borrowed">● 대출 중</span>';
        if (status === '연장') return '<span class="status-badge s-extended">● 연장</span>';
        return '<span class="status-badge s-available">● 대출 가능</span>';
    }

    document.getElementById('modalClose').addEventListener('click', () => {
        document.getElementById('scanModal').classList.remove('open');
        document.getElementById('bookId').value = '';
        document.getElementById('bookId').focus();
    });
    document.getElementById('scanModal').addEventListener('click', (e) => {
        if (e.target === e.currentTarget) {
            document.getElementById('scanModal').classList.remove('open');
            document.getElementById('bookId').value = '';
        }
    });

    document.getElementById('modalBorrowBtn').addEventListener('click', async () => {
        const name = document.getElementById('modalBorrowerName').value.trim();
        if (!name) { showMsg('이름을 입력해주세요', 'error'); return; }
        const ok = await processBook('borrow', currentModalId, name);
        if (ok) document.getElementById('scanModal').classList.remove('open');
    });
    document.getElementById('modalReturnBtn').addEventListener('click', async () => {
        const ok = await processBook('return', currentModalId, '');
        if (ok) document.getElementById('scanModal').classList.remove('open');
    });
    document.getElementById('modalExtendBtn').addEventListener('click', async () => {
        const ok = await processBook('extend', currentModalId, '');
        if (ok) document.getElementById('scanModal').classList.remove('open');
    });

    document.getElementById('modalEditToggle').addEventListener('click', () => {
        const area = document.getElementById('modalEditArea');
        const isOpen = area.style.display !== 'none';
        area.style.display = isOpen ? 'none' : 'block';
        document.getElementById('modalEditToggle').textContent = isOpen ? '✏️ 세부 정보 수정' : '▲ 닫기';
    });

    document.getElementById('modalSaveBtn').addEventListener('click', async () => {
        if (!currentModalId) return;
        const updates = {
            title: document.getElementById('modalEditTitle').value.trim(),
            author: document.getElementById('modalEditAuthor').value.trim(),
            publisher: document.getElementById('modalEditPublisher').value.trim(),
            genre: document.getElementById('modalEditGenre').value,
            ward: document.getElementById('modalEditWard').value,
            note: document.getElementById('modalEditNote').value.trim(),
        };
        if (!updates.title) { showMsg('도서명을 입력해주세요', 'error'); return; }
        try {
            await updateDoc(doc(db, 'books', currentModalId), updates);
            showMsg('저장 완료!', 'success');
            document.getElementById('scanModal').classList.remove('open');
        } catch (e) { showMsg('저장 실패', 'error'); }
    });

    /* ── ISBN 검색 (Open Library) ── */
    document.getElementById('isbnSearchBtn').addEventListener('click', fetchIsbn);
    document.getElementById('isbnInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') fetchIsbn(); });

    async function fetchIsbn() {
        const isbn = document.getElementById('isbnInput').value.trim().replace(/[-\s]/g, '');
        if (!isbn) { showMsg('ISBN을 입력해주세요', 'error'); return; }

        const loading = document.getElementById('isbnLoading');
        loading.style.display = 'block';

        try {
            // Open Library API
            const res = await fetch(`https://openlibrary.org/api/books?bibkeys=ISBN:${isbn}&format=json&jscmd=data`);
            const data = await res.json();
            const key = `ISBN:${isbn}`;

            if (data[key]) {
                const book = data[key];
                document.getElementById('newBookTitle').value = book.title || '';
                document.getElementById('newBookAuthor').value = (book.authors || []).map(a => a.name).join(', ') || '';
                document.getElementById('newBookPublisher').value = (book.publishers || []).map(p => p.name).join(', ') || '';
                showMsg('도서 정보 자동 입력 완료!', 'success');
            } else {
                // 한국 도서 – 알라딘/Yes24 API는 서버 필요, 안내 메시지
                showMsg('Open Library에서 찾을 수 없습니다. 직접 입력해주세요.', 'warning');
            }
        } catch (e) {
            showMsg('검색 중 오류가 발생했습니다.', 'error');
        } finally {
            loading.style.display = 'none';
        }
    }

    /* ── 관리자: 등록 ── */
    document.getElementById('registerBtn').addEventListener('click', async (e) => {
        e.preventDefault();
        e.stopPropagation();

        const newId = document.getElementById('newBookId').value.trim();
        const newTitle = document.getElementById('newBookTitle').value.trim();

        if (!newId) { showMsg('등록 번호를 입력해주세요.', 'error'); return; }
        if (!newTitle) { showMsg('도서/물품명을 입력해주세요.', 'error'); return; }

        try {
            showMsg('등록 중...', '');
            const bookDocRef = doc(db, 'books', newId);
            const bookSnap = await getDoc(bookDocRef);
            if (bookSnap.exists()) { showMsg('이미 등록된 번호입니다.', 'error'); return; }

            await setDoc(bookDocRef, {
                ward: document.getElementById('newBookWard').value,
                title: newTitle,
                author: document.getElementById('newBookAuthor').value.trim(),
                publisher: document.getElementById('newBookPublisher').value.trim(),
                genre: document.getElementById('newBookGenre').value,
                note: document.getElementById('newBookNote').value.trim(),
                status: '대출 가능',
                borrower: '',
                borrowDate: '',
                extendDate: '',
            });

            showMsg('[' + newTitle + '] 등록 완료!', 'success');
            ['newBookId','newBookTitle','newBookAuthor','newBookPublisher','newBookNote','isbnInput'].forEach(function(fieldId) {
                document.getElementById(fieldId).value = '';
            });
        } catch (err) {
            console.error('등록 오류:', err);
            showMsg('등록 실패: ' + err.message, 'error');
        }
    });

    /* ── 관리자: 수정 ── */
    document.getElementById('editBtn').addEventListener('click', async (e) => {
        e.preventDefault();
        try {
            const editId = document.getElementById('editBookId').value.trim();
            if (!editId) { showMsg('대상 번호를 입력해주세요.', 'error'); return; }
            const editDocRef = doc(db, 'books', editId);
            const editSnap = await getDoc(editDocRef);
            if (!editSnap.exists()) { showMsg('존재하지 않는 번호입니다.', 'error'); return; }

            const updates = {};
            const eTitle = document.getElementById('editBookTitle').value.trim();
            const eAuthor = document.getElementById('editBookAuthor').value.trim();
            const ePublisher = document.getElementById('editBookPublisher').value.trim();
            const eGenre = document.getElementById('editBookGenre').value;
            const eWard = document.getElementById('editBookWard').value;
            const eNote = document.getElementById('editBookNote').value.trim();

            if (eTitle) updates.title = eTitle;
            if (eAuthor) updates.author = eAuthor;
            if (ePublisher) updates.publisher = ePublisher;
            if (eGenre) updates.genre = eGenre;
            if (eWard) updates.ward = eWard;
            if (eNote) updates.note = eNote;

            if (Object.keys(updates).length === 0) { showMsg('수정할 내용을 입력해주세요.', 'warning'); return; }
            await updateDoc(editDocRef, updates);
            showMsg('수정 완료!', 'success');
            ['editBookId','editBookTitle','editBookAuthor','editBookPublisher','editBookNote'].forEach(function(fieldId) {
                document.getElementById(fieldId).value = '';
            });
            document.getElementById('editBookGenre').value = '';
            document.getElementById('editBookWard').value = '';
        } catch (err) {
            console.error('수정 오류:', err);
            showMsg('수정 실패: ' + err.message, 'error');
        }
    });

    /* ── 관리자: 삭제 ── */
    document.getElementById('deleteBtn').addEventListener('click', async (e) => {
        e.preventDefault();
        try {
            const delId = document.getElementById('editBookId').value.trim();
            if (!delId) { showMsg('삭제할 번호를 입력해주세요.', 'error'); return; }
            if (!confirm('정말 [' + delId + '] 항목을 삭제하시겠습니까?')) return;
            const delDocRef = doc(db, 'books', delId);
            const delSnap = await getDoc(delDocRef);
            if (!delSnap.exists()) { showMsg('존재하지 않는 번호입니다.', 'error'); return; }
            await deleteDoc(delDocRef);
            showMsg('삭제 완료', 'success');
            document.getElementById('editBookId').value = '';
        } catch (err) {
            console.error('삭제 오류:', err);
            showMsg('삭제 실패: ' + err.message, 'error');
        }
    });

    /* ── CSV 내보내기 ── */
    document.getElementById('exportCsvBtn').addEventListener('click', () => {
        const headers = ['등록번호','도서명','저자','출판사','장르','병동','상태','대출자','대출일','연장일','비고'];
        const rows = allBooks.map(b => [
            b.id, b.title, b.author||'', b.publisher||'',
            b.genre||'', b.ward||'', b.status||'',
            b.borrower||'', b.borrowDate||'', b.extendDate||'', b.note||''
        ]);
        const csv = [headers, ...rows].map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
        const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `도서현황_${today()}.csv`;
        a.click();
        showMsg('CSV 저장 완료!', 'success');
    });

    /* ── CSV 가져오기 ── */
    document.getElementById('csvFileInput').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            csvData = ev.target.result;
            showMsg(`파일 로드 완료: ${file.name}`, 'success');
        };
        reader.readAsText(file, 'UTF-8');
    });

    document.getElementById('importCsvBtn').addEventListener('click', async () => {
        if (!csvData) { showMsg('CSV 파일을 먼저 선택해주세요.', 'error'); return; }
        if (!confirm('CSV 데이터를 Firestore에 등록합니다. 기존 데이터는 덮어씁니다. 계속하시겠습니까?')) return;

        const lines = csvData.split('\n').filter(l => l.trim());
        const dataLines = lines.slice(1); // 헤더 제외
        let count = 0;

        for (const line of dataLines) {
            const cols = line.split(',').map(c => c.trim().replace(/^"|"$/g, '').replace(/""/g, '"'));
            const [id, title, author, publisher, genre, ward, , , , , note] = cols;
            if (!id || !title) continue;
            await setDoc(doc(db, 'books', id), {
                title, author: author||'', publisher: publisher||'',
                genre: genre||'기타', ward: ward||'미지정',
                note: note||'', status: '대출 가능',
                borrower: '', borrowDate: '', extendDate: ''
            }, { merge: true });
            count++;
        }
        showMsg(`${count}건 가져오기 완료!`, 'success');
        csvData = null;
        document.getElementById('csvFileInput').value = '';
    });

    /* ── 실시간 데이터 ── */
    const booksCol = collection(db, 'books');
    onSnapshot(booksCol, (snapshot) => {
        allBooks = [];
        snapshot.forEach(d => allBooks.push({ id: d.id, ...d.data() }));
        // ID 기준 정렬
        allBooks.sort((a, b) => a.id.localeCompare(b.id));
        updateStats();
        renderTable();
    });

    function updateStats() {
        const borrowed = allBooks.filter(b => b.status === '대출 중' || b.status === '연장').length;
        document.getElementById('statTotal').textContent = allBooks.length;
        document.getElementById('statBorrowed').textContent = borrowed;
        document.getElementById('statAvailable').textContent = allBooks.length - borrowed;
    }

    /* ── 테이블 렌더링 ── */
    function renderTable() {
        const search = document.getElementById('searchInput').value.toLowerCase();
        const ward = document.getElementById('wardFilter').value;
        const status = document.getElementById('statusFilter').value;
        const genre = document.getElementById('genreFilter').value;

        const filtered = allBooks.filter(b => {
            if (ward !== '전체' && b.ward !== ward) return false;
            if (status !== '전체' && b.status !== status) return false;
            if (genre !== '전체' && b.genre !== genre) return false;
            if (search) {
                const haystack = `${b.id} ${b.title} ${b.author||''} ${b.borrower||''}`.toLowerCase();
                if (!haystack.includes(search)) return false;
            }
            return true;
        });

        document.getElementById('visibleCount').textContent = `${filtered.length}건`;
        const tbody = document.getElementById('bookListBody');

        if (filtered.length === 0) {
            tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; color:var(--text3); padding:30px">검색 결과가 없습니다.</td></tr>';
            return;
        }

        tbody.innerHTML = filtered.map(b => {
            const genreKey = b.genre || '기타';
            const statusBadge = b.status === '대출 중'
                ? '<span class="status-badge s-borrowed">대출중</span>'
                : b.status === '연장'
                ? '<span class="status-badge s-extended">연장</span>'
                : '<span class="status-badge s-available">가능</span>';
            const dateStr = b.status === '연장' ? fmtDate(b.extendDate) : fmtDate(b.borrowDate);

            return `<tr style="cursor:pointer" onclick="window._openBook('${b.id}')">
                <td class="mono">${b.id}</td>
                <td><span class="genre-badge g-${genreKey}">${genreKey}</span></td>
                <td style="font-weight:500">${b.title}</td>
                <td class="hide-mobile" style="color:var(--text2)">${b.author || '-'}</td>
                <td class="hide-mobile"><span class="ward-badge">${b.ward || '-'}</span></td>
                <td>${statusBadge}</td>
                <td style="color:var(--text2)">${b.borrower || '-'}</td>
                <td class="hide-mobile mono" style="color:var(--text3); font-size:0.75rem">${dateStr}</td>
            </tr>`;
        }).join('');
    }

    // 테이블 행 클릭으로 모달 열기
    window._openBook = async (id) => {
        const docSnap = await getDoc(doc(db, 'books', id));
        if (docSnap.exists()) {
            document.getElementById('bookId').value = id;
            openScanModal(id, docSnap.data());
        }
    };

    /* ── 필터 이벤트 ── */
    ['searchInput','wardFilter','statusFilter','genreFilter'].forEach(id => {
        document.getElementById(id).addEventListener('input', renderTable);
    });

</script>
</body>
</html>
